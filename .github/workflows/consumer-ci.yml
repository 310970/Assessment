name: Provider CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  provider:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}

      - name: Run Provider Tests
        run: mvn test -Dtest=OmsProviderVerification
        env:
          PACT_BROKER_BASE_URL: https://fake-bcfd95cd.pactflow.io
          PACT_BROKER_TOKEN: 2lutjP1e1DZftSQpeahcYg
          pactbroker.url: https://fake-bcfd95cd.pactflow.io