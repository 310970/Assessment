name: Consumer CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  consumer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      # 1. Run Consumer Pact Tests (GENERATES PACT FILE)
      - name: Run Consumer Pact Tests
        run: mvn -Dtest=PosOmsConsumerPactTest test

      # 2. Publish Pact to PactFlow
      - name: Publish Pact to PactFlow
        run: |
          docker run --rm \
          -v ${{ github.workspace }}/target/pacts:/pacts \
          pactfoundation/pact-cli:latest \
          broker publish /pacts \
          --broker-base-url=${{ secrets.PACTFLOW_BASE_URL }} \
          --broker-token=${{ secrets.PACTFLOW_TOKEN }} \
          --consumer-app-version=${{ github.sha }} \
          --tag main

      # 3. Can I Deploy (Consumer check)
      - name: Can I Deploy (Consumer)
        run: |
          docker run --rm \
          pactfoundation/pact-cli:latest \
          broker can-i-deploy \
          --pacticipant pos-consumer \
          --version=${{ github.sha }} \
          --broker-base-url=${{ secrets.PACTFLOW_BASE_URL }} \
          --broker-token=${{ secrets.PACTFLOW_TOKEN }}