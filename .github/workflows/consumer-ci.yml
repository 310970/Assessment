name: Consumer CI

on: [push, pull_request]

jobs:
  consumer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run Consumer Tests
        run: mvn -Dtest=PosOmsConsumerPactTest test

      - name: Publish to PactFlow
        run: |
          docker run --rm \
          --network host \
          -v ${{ github.workspace }}/target/pacts:/pacts \
          pactfoundation/pact-cli:latest \
          broker publish /pacts \
          --broker-base-url=${{ secrets.PACTFLOW_URL }} \
          --broker-token=${{ secrets.PACTFLOW_TOKEN }} \
          --consumer-app-version=${{ github.sha }} \
          --branch=main