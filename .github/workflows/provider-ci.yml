name: Provider CI

on: [push, pull_request]

jobs:
  provider:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run Provider Verification
        run: |
          mvn -Dtest=OmsProviderVerification \
              -Dpact.broker.url=${{ secrets.PACTFLOW_URL }} \
              -Dpact.broker.token=${{ secrets.PACTFLOW_TOKEN }} \
              -Dgit.sha=${{ github.sha }} \
              -Dpact.verifier.publishResults=true \
              test

      - name: Can I Deploy
        run: |
          docker run --rm \
          --network host \
          pactfoundation/pact-cli:latest \
          broker can-i-deploy \
          --pacticipant pos-consumer \
          --version=${{ github.sha }} \
          --broker-base-url=${{ secrets.PACTFLOW_URL }} \
          --broker-token=${{ secrets.PACTFLOW_TOKEN }}